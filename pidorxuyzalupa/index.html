<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Видео</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--card:#1c1c1e;--text:#fff;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.12);--blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--purple:#bf5af2;--r:14px;--rs:10px}
[data-theme="light"]{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--card:#fff;--text:#000;--t2:rgba(0,0,0,.6);--t3:rgba(0,0,0,.35);--t4:rgba(0,0,0,.08);--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif,'Apple Color Emoji';-webkit-font-smoothing:antialiased;min-height:100vh;padding-bottom:80px}

.topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--t4)}
[data-theme="light"] .topbar{background:rgba(242,242,247,.75)}
.topbar h1{font-size:18px;font-weight:700}
.topbar-right{display:flex;gap:8px;align-items:center}

.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--t4);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.theme-btn:active{transform:scale(.9)}

.container{max-width:900px;margin:0 auto;padding:16px}

.upload-zone{background:var(--card);border:2px dashed var(--t3);border-radius:var(--r);padding:40px 20px;text-align:center;margin-bottom:20px;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--blue);background:var(--bg2)}
.upload-zone:active{transform:scale(.98)}
.upload-zone.dragover{border-color:var(--blue);background:rgba(10,132,255,.1)}
.upload-icon{font-size:48px;margin-bottom:12px}
.upload-title{font-size:17px;font-weight:600;margin-bottom:6px}
.upload-sub{font-size:13px;color:var(--t3)}
.upload-zone input[type="file"]{display:none}

.url-section{background:var(--card);border:1px solid var(--t4);border-radius:var(--r);padding:16px;margin-bottom:20px}
.url-section label{font-size:13px;color:var(--t2);margin-bottom:8px;display:block;font-weight:600}
.url-row{display:flex;gap:8px}
.inp{width:100%;padding:14px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--t4);color:var(--text);font-size:15px;outline:none;transition:.2s}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--t3)}

.btnP{padding:14px 24px;border-radius:var(--r);background:var(--blue);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btnP:active{transform:scale(.96);opacity:.8}
.btnS{padding:14px 24px;border-radius:var(--r);background:transparent;color:var(--text);border:1px solid var(--t4);font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btnS:active{transform:scale(.96)}
.btnD{padding:14px 24px;border-radius:var(--r);background:var(--red);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.btnD:active{transform:scale(.96);opacity:.8}

.pill{display:inline-block;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600}
.pill.bl{background:rgba(10,132,255,.15);color:var(--blue)}
.pill.gr{background:rgba(48,209,88,.15);color:var(--green)}
.pill.og{background:rgba(255,159,10,.15);color:var(--orange)}
.pill.rd{background:rgba(255,69,58,.15);color:var(--red)}

.videos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.videos-header h2{font-size:22px;font-weight:700}
.video-count{font-size:13px;color:var(--t3)}

.video-grid{display:grid;grid-template-columns:1fr;gap:16px}

.video-card{background:var(--card);border:1px solid var(--t4);border-radius:var(--r);overflow:hidden;transition:.2s}
.video-card:hover{border-color:var(--t3)}
.video-wrapper{position:relative;width:100%;background:#000;border-radius:var(--r) var(--r) 0 0;overflow:hidden}
.video-wrapper video,.video-wrapper iframe{width:100%;display:block;aspect-ratio:16/9;object-fit:contain;border:none;background:#000}
.video-info{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.video-meta{flex:1;min-width:0}
.video-title{font-size:15px;font-weight:600;margin-bottom:4px;word-break:break-word}
.video-date{font-size:12px;color:var(--t3)}
.video-actions{display:flex;gap:6px;flex-shrink:0}
.del-btn{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,69,58,.12);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.del-btn:active{transform:scale(.85)}

.progress-bar{width:100%;height:4px;background:var(--bg3);border-radius:2px;margin-top:12px;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0}

.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:.5}
.empty-title{font-size:18px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--t3)}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:.3s}
.sheet-overlay.show{opacity:1;pointer-events:all}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;background:var(--card);border-radius:16px 16px 0 0;transform:translateY(100%);transition:.35s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto}
.sheet.show{transform:translateY(0)}
.shBox{padding:20px 16px 34px}
.sheet-handle{width:36px;height:5px;background:var(--t4);border-radius:3px;margin:8px auto 0}
.sheet-title{font-size:18px;font-weight:700;margin:16px 0 20px;text-align:center}

.tab-row{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border:none;background:transparent;color:var(--t3);font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:.2s}
.tab-btn.active{background:var(--bg3);color:var(--text)}

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:600}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--green);color:#fff;padding:12px 24px;border-radius:var(--r);font-size:14px;font-weight:600;z-index:999;transition:.4s cubic-bezier(.32,.72,0,1);opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.error{background:var(--red)}

.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--t4);display:flex;justify-content:center;gap:32px;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50}
[data-theme="light"] .bnav{background:rgba(255,255,255,.85)}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px;color:var(--t3);font-size:10px;font-weight:600;cursor:pointer;transition:.2s;text-decoration:none}
.bnav-item.active{color:var(--blue)}
.bnav-item span:first-child{font-size:22px}

.share-link{background:var(--bg2);border:1px solid var(--t4);border-radius:var(--rs);padding:12px;font-size:13px;color:var(--t2);word-break:break-all;margin:12px 0}

@media(min-width:900px){
  .container{padding:24px}
  .video-grid{grid-template-columns:repeat(2,1fr)}
  .bnav{display:none}
  .topbar{padding:12px 24px}
  .upload-zone{padding:60px 40px}
}
@media(max-width:600px){
  .url-row{flex-direction:column}
  .url-row .btnP{width:100%}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>📹 Видео</h1>
  <div class="topbar-right">
    <span class="pill bl" id="statusPill">Готово</span>
    <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">🌓</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MAIN -->
<div class="container">

  <!-- UPLOAD ZONE -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📁</div>
    <div class="upload-title">Загрузить видео</div>
    <div class="upload-sub">Нажмите или перетащите файл сюда · MP4, WebM, MOV</div>
    <input type="file" id="fileInput" accept="video/*" multiple>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
  </div>

  <!-- URL Section -->
  <div class="url-section">
    <label>Или вставьте ссылку на видео (YouTube, прямая ссылка)</label>
    <div class="url-row">
      <input type="text" class="inp" id="urlInput" placeholder="https://youtube.com/watch?v=... или прямая ссылка на .mp4">
      <button class="btnP" onclick="addFromUrl()">Добавить</button>
    </div>
  </div>

  <!-- VIDEOS -->
  <div class="videos-header">
    <h2>Все видео</h2>
    <span class="video-count" id="videoCount">0 видео</span>
  </div>

  <div id="videoGrid" class="video-grid">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎬</div>
      <div class="empty-title">Пока нет видео</div>
      <div class="empty-sub">Загрузите файл или добавьте ссылку</div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <a class="bnav-item active" href="#">
    <span>📹</span>
    <span>Видео</span>
  </a>
  <a class="bnav-item" href="#" onclick="showShareSheet()">
    <span>🔗</span>
    <span>Поделиться</span>
  </a>
</div>

<!-- SHARE SHEET -->
<div class="sheet-overlay" id="shareOverlay" onclick="closeShareSheet()"></div>
<div class="sheet" id="shareSheet">
  <div class="sheet-handle"></div>
  <div class="shBox">
    <div class="sheet-title">Поделиться страницей</div>
    <p style="font-size:14px;color:var(--t2);text-align:center;margin-bottom:12px">Отправьте эту ссылку друзьям — они увидят все видео:</p>
    <div class="share-link" id="shareLink"></div>
    <button class="btnP" style="width:100%" onclick="copyLink()">📋 Копировать ссылку</button>
    <div style="height:12px"></div>
    <button class="btnS" style="width:100%" onclick="closeShareSheet()">Закрыть</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// ====== FIREBASE CONFIG — ЗАМЕНИТЕ НА СВОЙ ======
const firebaseConfig = {
  apiKey: "AIzaSyBxYfKGH9ZqY0EBTcdS-dEaxjLwuO7bfqk",
  authDomain: "diary-b4616.firebaseapp.com",
  databaseURL: "https://diary-b4616-default-rtdb.firebaseio.com",
  projectId: "diary-b4616",
  storageBucket: "diary-b4616.firebasestorage.app",
  messagingSenderId: "607133630800",
  appId: "1:607133630800:web:59287a890d371e8e8bfb0e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();
const videosRef = db.ref('videos');

// ====== THEME ======
function toggleTheme(){
  const h = document.documentElement;
  const t = h.getAttribute('data-theme')==='light'?'dark':'light';
  h.setAttribute('data-theme',t);
  localStorage.setItem('theme',t);
}
(function(){
  const saved = localStorage.getItem('theme');
  if(saved) document.documentElement.setAttribute('data-theme',saved);
})();

// ====== TOAST ======
function showToast(msg, err){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err?' error':'');
  setTimeout(()=> t.className='toast', 3000);
}

// ====== DRAG & DROP ======
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('dragover')});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e=>{
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if(files.length) handleFiles(files);
});
fileInput.addEventListener('change', e=>{
  if(e.target.files.length) handleFiles(e.target.files);
});

// ====== UPLOAD FILES TO FIREBASE STORAGE ======
function handleFiles(files){
  for(let f of files){
    if(!f.type.startsWith('video/')){
      showToast('Файл "'+f.name+'" не является видео', true);
      continue;
    }
    uploadFile(f);
  }
}

function uploadFile(file){
  const pb = document.getElementById('progressBar');
  const pf = document.getElementById('progressFill');
  const sp = document.getElementById('statusPill');
  pb.style.display = 'block';
  pf.style.width = '0%';
  sp.textContent = 'Загрузка...';
  sp.className = 'pill og';

  const fname = Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const ref = storage.ref('videos/'+fname);
  const task = ref.put(file);

  task.on('state_changed',
    snap=>{
      const pct = (snap.bytesTransferred/snap.totalBytes*100).toFixed(0);
      pf.style.width = pct+'%';
    },
    err=>{
      showToast('Ошибка загрузки: '+err.message, true);
      pb.style.display='none';
      sp.textContent='Ошибка';sp.className='pill rd';
    },
    ()=>{
      task.snapshot.ref.getDownloadURL().then(url=>{
        saveVideo({
          title: file.name,
          url: url,
          type: 'file',
          date: new Date().toISOString(),
          size: file.size
        });
        pb.style.display='none';
        pf.style.width='0%';
        sp.textContent='Готово';sp.className='pill gr';
        showToast('✅ Видео загружено!');
        fileInput.value='';
      });
    }
  );
}

// ====== ADD FROM URL ======
function addFromUrl(){
  const input = document.getElementById('urlInput');
  let url = input.value.trim();
  if(!url){showToast('Вставьте ссылку', true);return}

  const yt = parseYouTube(url);
  saveVideo({
    title: yt ? 'YouTube видео' : url.split('/').pop().split('?')[0] || 'Видео по ссылке',
    url: yt ? yt : url,
    type: yt ? 'youtube' : 'url',
    date: new Date().toISOString()
  });
  input.value='';
  showToast('✅ Видео добавлено!');
}

function parseYouTube(url){
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? 'https://www.youtube.com/embed/'+m[1] : null;
}

// ====== SAVE TO FIREBASE ======
function saveVideo(data){
  videosRef.push(data);
}

// ====== DELETE ======
function deleteVideo(key, storageUrl){
  if(!confirm('Удалить это видео?')) return;
  videosRef.child(key).remove();
  // Попытка удалить из storage если это загруженный файл
  if(storageUrl && storageUrl.includes('firebasestorage')){
    try{ storage.refFromURL(storageUrl).delete().catch(()=>{}); }catch(e){}
  }
  showToast('🗑 Видео удалено');
}

// ====== RENDER ======
function renderVideos(videos){
  const grid = document.getElementById('videoGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('videoCount');

  const entries = videos ? Object.entries(videos) : [];
  count.textContent = entries.length + ' видео';

  if(!entries.length){
    grid.innerHTML = '';
    grid.appendChild(createEmpty());
    return;
  }

  // Сортировка: новые первыми
  entries.sort((a,b)=> new Date(b[1].date) - new Date(a[1].date));

  grid.innerHTML = '';
  entries.forEach(([key, v])=>{
    const card = document.createElement('div');
    card.className = 'video-card';

    let mediaHTML = '';
    if(v.type === 'youtube'){
      mediaHTML = `<iframe src="${v.url}" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>`;
    } else {
      mediaHTML = `<video controls preload="metadata" playsinline><source src="${v.url}">Браузер не поддерживает видео</video>`;
    }

    const d = v.date ? new Date(v.date) : new Date();
    const dateStr = d.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const sizeStr = v.size ? formatSize(v.size) : '';
    const typePill = v.type==='youtube'?'<span class="pill rd" style="margin-left:6px">YouTube</span>'
                    :v.type==='file'?'<span class="pill gr" style="margin-left:6px">Файл</span>'
                    :'<span class="pill bl" style="margin-left:6px">Ссылка</span>';

    card.innerHTML = `
      <div class="video-wrapper">${mediaHTML}</div>
      <div class="video-info">
        <div class="video-meta">
          <div class="video-title">${escHtml(v.title)}${typePill}</div>
          <div class="video-date">${dateStr}${sizeStr?' · '+sizeStr:''}</div>
        </div>
        <div class="video-actions">
          <button class="del-btn" onclick="deleteVideo('${key}','${v.url||''}')" title="Удалить">🗑</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function createEmpty(){
  const d = document.createElement('div');
  d.className='empty-state';d.id='emptyState';
  d.innerHTML='<div class="empty-icon">🎬</div><div class="empty-title">Пока нет видео</div><div class="empty-sub">Загрузите файл или добавьте ссылку</div>';
  return d;
}

function formatSize(b){
  if(b<1024) return b+'Б';
  if(b<1048576) return (b/1024).toFixed(1)+'КБ';
  if(b<1073741824) return (b/1048576).toFixed(1)+'МБ';
  return (b/1073741824).toFixed(2)+'ГБ';
}

function escHtml(s){
  const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;
}

// ====== REALTIME LISTENER ======
videosRef.on('value', snap=>{
  renderVideos(snap.val());
});

// ====== SHARE SHEET ======
function showShareSheet(){
  document.getElementById('shareLink').textContent = window.location.href;
  document.getElementById('shareOverlay').classList.add('show');
  document.getElementById('shareSheet').classList.add('show');
}
function closeShareSheet(){
  document.getElementById('shareOverlay').classList.remove('show');
  document.getElementById('shareSheet').classList.remove('show');
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(()=>showToast('📋 Ссылка скопирована!')).catch(()=>showToast('Не удалось скопировать',true));
}
</script>
</body>
</html>
