<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Конструктор рабочих программ</title>
<style>
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--card:#1c1c1e;--text:#fff;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.12);--blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--purple:#bf5af2;--r:14px;--rs:10px}
[data-theme="light"]{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--card:#fff;--text:#000;--t2:rgba(0,0,0,.6);--t3:rgba(0,0,0,.35);--t4:rgba(0,0,0,.08);--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--t4);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px)}
.topbar h1{font-size:17px;font-weight:600}
.topbar-r{display:flex;gap:8px;align-items:center}
.container{max-width:960px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--t4);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.card p{font-size:13px;color:var(--t2);line-height:1.5}
.btn{border:none;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.96);opacity:.8}
.btnP{background:var(--blue);color:#fff}
.btnS{background:transparent;color:var(--text);border:1px solid var(--t4)!important}
.btnD{background:var(--red);color:#fff}
.btnG{background:var(--green);color:#fff}
.btnSm{padding:6px 14px;font-size:12px;border-radius:var(--rs)}
.inp{width:100%;padding:14px;border-radius:var(--r);border:1px solid var(--t4);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--blue)}
textarea.inp{min-height:120px;resize:vertical;line-height:1.6}
select.inp{appearance:none;-webkit-appearance:none}
label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.fg{margin-bottom:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600}
.pill.bl{background:rgba(10,132,255,.15);color:var(--blue)}
.pill.gr{background:rgba(48,209,88,.15);color:var(--green)}
.pill.og{background:rgba(255,159,10,.15);color:var(--orange)}
.pill.rd{background:rgba(255,69,58,.15);color:var(--red)}
.pill.pr{background:rgba(191,90,242,.15);color:var(--purple)}
.flex-b{display:flex;justify-content:space-between;align-items:center}
.gap8{display:flex;gap:8px;flex-wrap:wrap}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.mb12{margin-bottom:12px}
.hidden{display:none!important}

/* Auth screen */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--card);border:1px solid var(--t4);border-radius:20px;padding:32px;width:100%;max-width:380px;text-align:center}
.auth-box h2{font-size:22px;margin-bottom:8px}
.auth-box p{font-size:13px;color:var(--t3);margin-bottom:24px}
.auth-err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}

/* Tabs */
.tabs{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:16px}
.tab{padding:8px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--bg3);color:var(--t2);border:none;transition:all .2s}
.tab.active{background:var(--blue);color:#fff}

/* Sheet */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-ov.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;animation:shUp .3s ease}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:5px;border-radius:3px;background:var(--t4);margin:8px auto 0}
.sh-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 0}
.sh-head h2{font-size:17px;font-weight:600}
.sh-close{background:var(--bg3);border:none;color:var(--text);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sh-body{padding:20px}

/* Section tabs inside program */
.sec-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.sec-tab{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--t3);border:none;transition:all .15s}
.sec-tab.active{background:var(--purple);color:#fff}
.sec-tab:hover{color:var(--text)}

/* Section content */
.sec-content{background:var(--bg3);border-radius:var(--r);padding:16px;min-height:200px}
.sec-content h4{font-size:14px;margin-bottom:12px;color:var(--blue)}

/* Read-only mode */
.readonly-text{background:var(--bg2);border:1px solid var(--t4);border-radius:var(--r);padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;color:var(--text);min-height:60px}

/* Notification */
.toast{position:fixed;top:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:600;z-index:999;transform:translateX(120%);transition:transform .3s ease}
.toast.show{transform:translateX(0)}

/* Theme toggle */
.th-tog{background:var(--bg3);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

@media(max-width:600px){
  .sec-tabs{gap:3px}
  .sec-tab{font-size:10px;padding:5px 8px}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ======================== AUTH SCREEN ======================== -->
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <div style="font-size:48px;margin-bottom:12px">📄</div>
    <h2>Конструктор программ</h2>
    <p>Войдите в систему для работы с рабочими программами техникума</p>
    <div class="fg">
      <label>Email</label>
      <input class="inp" id="authEmail" type="email" placeholder="admin@test.ru">
    </div>
    <div class="fg">
      <label>Пароль</label>
      <input class="inp" id="authPass" type="password" placeholder="test">
    </div>
    <button class="btn btnP" style="width:100%" onclick="doLogin()">Войти</button>
    <div class="auth-err" id="authErr"></div>
    <p style="margin-top:16px;font-size:11px;color:var(--t3)">
      admin@test.ru / test — редактирование<br>
      test@test.ru / test — только просмотр
    </p>
  </div>
</div>

<!-- ======================== MAIN APP ======================== -->
<div id="appMain" class="hidden">
  <!-- TOPBAR -->
  <div class="topbar">
    <h1>📄 Конструктор программ</h1>
    <div class="topbar-r">
      <button class="th-tog" onclick="toggleTheme()">🌓</button>
      <span id="userLabel" style="font-size:12px;color:var(--t2)"></span>
      <span id="roleLabel" class="pill bl" style="font-size:10px"></span>
      <button class="btn btnSm btnS" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <!-- PROGRAMS LIST -->
  <div class="container" id="programsListPage">
    <div class="flex-b mb12">
      <h2 style="font-size:20px;font-weight:700">Рабочие программы</h2>
      <button class="btn btnP btnSm" id="btnAddProgram" onclick="openAddProgram()">+ Добавить программу</button>
    </div>
    <div id="programsList">
      <p style="color:var(--t3);text-align:center;padding:60px 20px">Загрузка...</p>
    </div>
  </div>

  <!-- PROGRAM EDITOR -->
  <div class="container hidden" id="programEditorPage">
    <div class="flex-b mb12">
      <button class="btn btnSm btnS" onclick="backToList()">← Назад к списку</button>
      <div class="gap8">
        <button class="btn btnSm btnG" id="btnDownloadDoc" onclick="downloadAsDocx()">📥 Скачать DOCX</button>
        <button class="btn btnSm btnS" id="btnDownloadPdf" onclick="downloadAsPdf()">📥 PDF</button>
      </div>
    </div>
    <div class="card" id="programHeader" style="border-left:4px solid var(--purple)">
      <h3 id="editorTitle"></h3>
      <p id="editorMeta"></p>
    </div>

    <!-- Section tabs -->
    <div class="sec-tabs" id="sectionTabs"></div>

    <!-- Section content area -->
    <div class="sec-content" id="sectionContent">
      <p style="color:var(--t3);text-align:center;padding:40px">Выберите раздел</p>
    </div>
  </div>
</div>

<!-- ======================== SHEET: Add Program ======================== -->
<div class="sheet-ov" id="sheetAddProgram">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <h2>Новая рабочая программа</h2>
      <button class="sh-close" onclick="closeSheet('sheetAddProgram')">✕</button>
    </div>
    <div class="sh-body">
      <div class="fg">
        <label>Код дисциплины</label>
        <input class="inp" id="newCode" placeholder="ОУП.06">
      </div>
      <div class="fg">
        <label>Название дисциплины</label>
        <input class="inp" id="newTitle" placeholder="Иностранный язык">
      </div>
      <div class="fg">
        <label>Специальность</label>
        <input class="inp" id="newSpecialty" placeholder="11.02.06 Техническая эксплуатация...">
      </div>
      <div class="fg">
        <label>Квалификация выпускника</label>
        <input class="inp" id="newQualification" placeholder="Техник">
      </div>
      <div class="fg">
        <label>Форма обучения</label>
        <input class="inp" id="newForm" placeholder="Очная" value="Очная">
      </div>
      <div class="fg">
        <label>Год начала подготовки</label>
        <input class="inp" id="newYear" type="number" placeholder="2024" value="2024">
      </div>
      <button class="btn btnP" style="width:100%" onclick="saveNewProgram()">📄 Создать программу</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<!-- docx -->
<script src="https://unpkg.com/docx@8.2.2/build/index.umd.js"></script>

<script>
// ======================================================================
// FIREBASE CONFIG — ЗАМЕНИ НА СВОИ
// ======================================================================
const firebaseConfig = {
  apiKey: "AIzaSyBvAJOkMBqaIqkEpAO3tu2_Gcb-sEON3uQ",
  authDomain: "diary-b9e53.firebaseapp.com",
  databaseURL: "https://diary-b9e53-default-rtdb.firebaseio.com",
  projectId: "diary-b9e53",
  storageBucket: "diary-b9e53.firebasestorage.app",
  messagingSenderId: "922889650498",
  appId: "1:922889650498:web:1d40e14dd9c50eef3e1cf9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ======================================================================
// РАЗДЕЛЫ ПРОГРАММЫ (ключи и названия)
// ======================================================================
const SECTIONS = [
  { key: 'title_page',       name: 'Титульный лист',        icon: '📋' },
  { key: 'goals',            name: 'Цели и задачи',         icon: '🎯' },
  { key: 'place_in_oop',     name: 'Место в структуре ООП', icon: '🏗' },
  { key: 'results',          name: 'Результаты обучения',   icon: '📊' },
  { key: 'structure',        name: 'Структура и содержание', icon: '📐' },
  { key: 'lectures',         name: 'Лекционные занятия',    icon: '🎓' },
  { key: 'practices',        name: 'Практические занятия',  icon: '🔬' },
  { key: 'labs',             name: 'Лабораторные работы',   icon: '🧪' },
  { key: 'coursework',       name: 'Курсовые работы',       icon: '📝' },
  { key: 'self_study',       name: 'Самостоятельная работа', icon: '📖' },
  { key: 'methodology',      name: 'Учебно-методическое обесп.', icon: '📚' },
  { key: 'material_tech',    name: 'Материально-техническое обесп.', icon: '🏢' },
  { key: 'approval',         name: 'Рассмотрение и утверждение', icon: '✅' }
];

// ======================================================================
// STATE
// ======================================================================
let currentUser = null;   // firebase auth user
let userRole = null;      // 'admin' | 'viewer'
let currentProgramId = null;
let currentProgramData = null;
let currentSectionKey = null;

// ======================================================================
// THEME
// ======================================================================
function toggleTheme() {
  const h = document.documentElement;
  h.dataset.theme = h.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', h.dataset.theme);
}
if (localStorage.getItem('theme')) document.documentElement.dataset.theme = localStorage.getItem('theme');

// ======================================================================
// TOAST
// ======================================================================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ======================================================================
// SHEETS
// ======================================================================
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.sheet-ov').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

// ======================================================================
// AUTH
// ======================================================================
function doLogin() {
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  document.getElementById('authErr').textContent = '';
  if (!email || !pass) { document.getElementById('authErr').textContent = 'Заполните все поля'; return; }

  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => {
      // Если пользователь не существует — создаём
      if (err.code === 'auth/user-not-found') {
        auth.createUserWithEmailAndPassword(email, pass)
          .then(cred => {
            // Сохраняем роль
            const role = email === 'admin@test.ru' ? 'admin' : 'viewer';
            return db.ref('users/' + cred.user.uid).set({
              email: email,
              role: role,
              createdAt: Date.now()
            });
          })
          .catch(err2 => {
            document.getElementById('authErr').textContent = err2.message;
          });
      } else if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        document.getElementById('authErr').textContent = 'Неверный пароль';
      } else {
        document.getElementById('authErr').textContent = err.message;
      }
    });
}

function doLogout() {
  auth.signOut();
}

// Auth state listener
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    // Get role from DB
    db.ref('users/' + user.uid).once('value', snap => {
      const data = snap.val();
      if (!data) {
        // First login — set role based on email
        const role = user.email === 'admin@test.ru' ? 'admin' : 'viewer';
        db.ref('users/' + user.uid).set({ email: user.email, role: role, createdAt: Date.now() });
        userRole = role;
      } else {
        userRole = data.role || 'viewer';
      }
      showApp();
    });
  } else {
    currentUser = null;
    userRole = null;
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appMain').classList.add('hidden');
  }
});

function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('userLabel').textContent = currentUser.email;
  document.getElementById('roleLabel').textContent = userRole === 'admin' ? '🔧 Редактор' : '👁 Просмотр';
  document.getElementById('roleLabel').className = 'pill ' + (userRole === 'admin' ? 'gr' : 'bl');

  // Скрыть кнопку добавления для viewer
  document.getElementById('btnAddProgram').classList.toggle('hidden', userRole !== 'admin');

  loadPrograms();
  showProgramsList();
}

function isAdmin() { return userRole === 'admin'; }

// ======================================================================
// PROGRAMS LIST
// ======================================================================
function showProgramsList() {
  document.getElementById('programsListPage').classList.remove('hidden');
  document.getElementById('programEditorPage').classList.add('hidden');
  currentProgramId = null;
}

function backToList() {
  showProgramsList();
}

let programsListener = null;
function loadPrograms() {
  if (programsListener) db.ref('programs').off('value', programsListener);
  programsListener = db.ref('programs').on('value', snap => {
    const programs = snap.val() || {};
    const container = document.getElementById('programsList');

    if (Object.keys(programs).length === 0) {
      container.innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <div style="font-size:64px;margin-bottom:16px">📄</div>
          <p style="color:var(--t3);font-size:15px">Нет рабочих программ</p>
          ${isAdmin() ? '<p style="color:var(--t3);font-size:13px;margin-top:8px">Нажмите «+ Добавить программу» чтобы создать первую</p>' : '<p style="color:var(--t3);font-size:13px;margin-top:8px">Администратор ещё не добавил программы</p>'}
        </div>`;
      return;
    }

    container.innerHTML = '';
    Object.entries(programs).forEach(([id, prog]) => {
      const sectionsCount = prog.sections ? Object.keys(prog.sections).filter(k => prog.sections[k] && prog.sections[k].trim()).length : 0;
      const totalSections = SECTIONS.length;
      const pct = Math.round((sectionsCount / totalSections) * 100);
      const dateStr = prog.createdAt ? new Date(prog.createdAt).toLocaleDateString('ru') : '';
      const updStr = prog.updatedAt ? new Date(prog.updatedAt).toLocaleDateString('ru') : '';

      container.innerHTML += `
        <div class="card" style="cursor:pointer;border-left:4px solid var(--purple)" onclick="openProgram('${id}')">
          <div class="flex-b">
            <div>
              <span class="pill pr">${prog.code || ''}</span>
              <span class="pill bl">${prog.year || ''}</span>
            </div>
            <span class="pill ${pct >= 80 ? 'gr' : pct >= 40 ? 'og' : 'rd'}">${sectionsCount}/${totalSections} разделов</span>
          </div>
          <h3 class="mt8">${prog.title || 'Без названия'}</h3>
          <p>${prog.specialty || ''}</p>
          <p class="mt8" style="font-size:11px;color:var(--t3)">
            Создано: ${dateStr}${updStr ? ' • Обновлено: ' + updStr : ''}
          </p>
          ${isAdmin() ? `<div class="mt8"><button class="btn btnSm btnD" onclick="event.stopPropagation();deleteProgram('${id}')">🗑 Удалить</button></div>` : ''}
        </div>`;
    });
  });
}

// ======================================================================
// ADD PROGRAM
// ======================================================================
function openAddProgram() {
  if (!isAdmin()) return;
  document.getElementById('newCode').value = '';
  document.getElementById('newTitle').value = '';
  document.getElementById('newSpecialty').value = '';
  document.getElementById('newQualification').value = '';
  document.getElementById('newForm').value = 'Очная';
  document.getElementById('newYear').value = new Date().getFullYear();
  openSheet('sheetAddProgram');
}

function saveNewProgram() {
  if (!isAdmin()) return;
  const code = document.getElementById('newCode').value.trim();
  const title = document.getElementById('newTitle').value.trim();
  if (!code || !title) { alert('Заполните код и название'); return; }

  const data = {
    code: code,
    title: title,
    specialty: document.getElementById('newSpecialty').value.trim(),
    qualification: document.getElementById('newQualification').value.trim(),
    form: document.getElementById('newForm').value.trim(),
    year: document.getElementById('newYear').value.trim(),
    createdBy: currentUser.uid,
    createdAt: Date.now(),
    updatedAt: Date.now(),
    sections: {}
  };

  // Инициализируем пустые разделы
  SECTIONS.forEach(s => { data.sections[s.key] = ''; });

  db.ref('programs').push(data);
  closeSheet('sheetAddProgram');
  toast('✅ Программа создана');
}

function deleteProgram(id) {
  if (!isAdmin()) return;
  if (confirm('Удалить эту рабочую программу? Это действие необратимо.')) {
    db.ref('programs/' + id).remove();
    toast('🗑 Программа удалена');
  }
}

// ======================================================================
// OPEN PROGRAM (editor / viewer)
// ======================================================================
function openProgram(id) {
  currentProgramId = id;
  currentSectionKey = null;

  document.getElementById('programsListPage').classList.add('hidden');
  document.getElementById('programEditorPage').classList.remove('hidden');

  // Load program data
  db.ref('programs/' + id).on('value', snap => {
    currentProgramData = snap.val();
    if (!currentProgramData) { backToList(); return; }
    renderEditor();
  });
}

function renderEditor() {
  const prog = currentProgramData;
  document.getElementById('editorTitle').textContent = prog.code + ' — ' + prog.title;
  document.getElementById('editorMeta').textContent =
    `${prog.specialty || ''} • ${prog.qualification || ''} • ${prog.form || ''} • ${prog.year || ''}`;

  // Render section tabs
  const tabsEl = document.getElementById('sectionTabs');
  tabsEl.innerHTML = '';
  SECTIONS.forEach(s => {
    const hasContent = prog.sections && prog.sections[s.key] && prog.sections[s.key].trim();
    const isActive = currentSectionKey === s.key;
    tabsEl.innerHTML += `
      <button class="sec-tab ${isActive ? 'active' : ''}" onclick="openSection('${s.key}')" title="${s.name}">
        ${s.icon} ${s.name}
        ${hasContent ? ' ✓' : ''}
      </button>`;
  });

  // If section is selected, render it
  if (currentSectionKey) {
    renderSection(currentSectionKey);
  }
}

function openSection(key) {
  currentSectionKey = key;
  // Update tab styles
  document.querySelectorAll('.sec-tab').forEach(t => t.classList.remove('active'));
  event.target.closest('.sec-tab').classList.add('active');
  renderSection(key);
}

function renderSection(key) {
  const sec = SECTIONS.find(s => s.key === key);
  if (!sec) return;
  const content = (currentProgramData.sections && currentProgramData.sections[key]) || '';
  const container = document.getElementById('sectionContent');

  if (isAdmin()) {
    // ADMIN: editable
    container.innerHTML = `
      <h4>${sec.icon} ${sec.name}</h4>
      <div class="fg">
        <label>Содержимое раздела (форматированный текст)</label>
        <textarea class="inp" id="sectionTextarea"
                  style="min-height:300px;font-size:14px;line-height:1.7"
                  placeholder="Введите содержимое раздела «${sec.name}»..."
                  oninput="markUnsaved()">${escapeHtml(content)}</textarea>
      </div>
      <div class="gap8">
        <button class="btn btnP" onclick="saveSection()">💾 Сохранить раздел</button>
        <button class="btn btnSm btnS" onclick="clearSection()">🗑 Очистить</button>
      </div>
      <div id="saveStatus" class="mt8" style="font-size:12px;color:var(--t3)">
        ${content ? '✅ Сохранено' : '📝 Раздел пуст — заполните и сохраните'}
      </div>`;
  } else {
    // VIEWER: read-only
    container.innerHTML = `
      <h4>${sec.icon} ${sec.name}</h4>
      ${content
        ? `<div class="readonly-text">${escapeHtml(content)}</div>`
        : `<p style="color:var(--t3);padding:20px;text-align:center">Раздел не заполнен</p>`
      }`;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function markUnsaved() {
  const st = document.getElementById('saveStatus');
  if (st) st.innerHTML = '<span style="color:var(--orange)">⚠️ Есть несохранённые изменения</span>';
}

function saveSection() {
  if (!isAdmin() || !currentProgramId || !currentSectionKey) return;
  const text = document.getElementById('sectionTextarea').value;
  db.ref('programs/' + currentProgramId + '/sections/' + currentSectionKey).set(text);
  db.ref('programs/' + currentProgramId + '/updatedAt').set(Date.now());
  const st = document.getElementById('saveStatus');
  if (st) st.innerHTML = '<span style="color:var(--green)">✅ Сохранено</span>';
  toast('✅ Раздел сохранён');
}

function clearSection() {
  if (!isAdmin()) return;
  if (confirm('Очистить содержимое этого раздела?')) {
    document.getElementById('sectionTextarea').value = '';
    saveSection();
  }
}

// ======================================================================
// DOWNLOAD DOCX
// ======================================================================
function downloadAsDocx() {
  if (!currentProgramData) return;
  const prog = currentProgramData;
  const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, PageBreak } = docx;

  const children = [];

  // Title page
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 200 }, children: [
    new TextRun({ text: 'РАБОЧАЯ ПРОГРАММА', bold: true, size: 32 })
  ]}));
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 100 }, children: [
    new TextRun({ text: `учебной дисциплины ${prog.code} ${prog.title}`, size: 28 })
  ]}));
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 100 }, children: [
    new TextRun({ text: `Специальность: ${prog.specialty || ''}`, size: 22 })
  ]}));
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 100 }, children: [
    new TextRun({ text: `Квалификация: ${prog.qualification || ''} • Форма обучения: ${prog.form || ''} • Год: ${prog.year || ''}`, size: 20 })
  ]}));
  children.push(new Paragraph({ children: [new PageBreak()] }));

  // Each section
  SECTIONS.forEach(sec => {
    const text = (prog.sections && prog.sections[sec.key]) || '';
    children.push(new Paragraph({
      heading: HeadingLevel.HEADING_2,
      spacing: { before: 400, after: 200 },
      children: [new TextRun({ text: sec.icon + ' ' + sec.name, bold: true, size: 26 })]
    }));
    if (text) {
      text.split('\n').forEach(line => {
        children.push(new Paragraph({ spacing: { after: 80 }, children: [
          new TextRun({ text: line, size: 22 })
        ]}));
      });
    } else {
      children.push(new Paragraph({ children: [
        new TextRun({ text: '(Раздел не заполнен)', italics: true, size: 22, color: '999999' })
      ]}));
    }
  });

  const doc = new Document({ sections: [{ children }] });

  Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `РП_${prog.code}_${prog.title}.docx`;
    a.click();
    URL.revokeObjectURL(url);
  });
  toast('📥 DOCX скачивается...');
}

// ======================================================================
// DOWNLOAD PDF
// ======================================================================
function downloadAsPdf() {
  if (!currentProgramData) return;
  const prog = currentProgramData;

  // Build HTML for PDF
  let html = `
    <div style="font-family:'Times New Roman',serif;color:#000;padding:20px">
      <h1 style="text-align:center;font-size:18px;margin-bottom:4px">РАБОЧАЯ ПРОГРАММА</h1>
      <h2 style="text-align:center;font-size:16px;font-weight:normal;margin-bottom:8px">
        учебной дисциплины ${prog.code} ${prog.title}
      </h2>
      <p style="text-align:center;font-size:13px;color:#666;margin-bottom:24px">
        ${prog.specialty || ''} • ${prog.qualification || ''} • ${prog.form || ''} • ${prog.year || ''}
      </p>
      <hr style="margin-bottom:24px">`;

  SECTIONS.forEach(sec => {
    const text = (prog.sections && prog.sections[sec.key]) || '';
    html += `<h3 style="font-size:14px;margin:20px 0 8px;color:#333">${sec.icon} ${sec.name}</h3>`;
    if (text) {
      html += `<div style="font-size:13px;line-height:1.7;white-space:pre-wrap">${escapeHtml(text)}</div>`;
    } else {
      html += `<p style="color:#999;font-style:italic;font-size:12px">(Раздел не заполнен)</p>`;
    }
  });

  html += '</div>';

  const wrapper = document.createElement('div');
  wrapper.innerHTML = html;

  html2pdf().set({
    margin: [15, 15, 15, 15],
    filename: `РП_${prog.code}_${prog.title}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(wrapper).save();

  toast('📥 PDF скачивается...');
}
