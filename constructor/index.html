<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Конструктор документов ООП</title>
<style>
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--card:#1c1c1e;--text:#fff;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.12);--blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--purple:#bf5af2;--r:14px;--rs:10px}
[data-theme="light"]{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--card:#fff;--text:#000;--t2:rgba(0,0,0,.6);--t3:rgba(0,0,0,.35);--t4:rgba(0,0,0,.08);--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--t4);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.topbar h1{font-size:17px;font-weight:600}
.topbar-right{display:flex;gap:8px;align-items:center}
.container{max-width:900px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--t4);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:transform .15s}
.card:active{transform:scale(.98)}
.card h3{font-size:15px;font-weight:600;margin-bottom:8px}
.card p{font-size:13px;color:var(--t2);line-height:1.4}
.btnP{background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s;display:inline-flex;align-items:center;gap:6px}
.btnP:active{transform:scale(.96);opacity:.8}
.btnS{background:transparent;color:var(--text);border:1px solid var(--t4);padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:500;cursor:pointer;transition:transform .1s}
.btnS:active{transform:scale(.96)}
.btnD{background:var(--red);color:#fff;border:none;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s}
.btnD:active{transform:scale(.96)}
.btnSm{padding:6px 12px;font-size:12px;border-radius:var(--rs)}
.inp{width:100%;padding:14px;border-radius:var(--r);border:1px solid var(--t4);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--blue)}
textarea.inp{min-height:100px;resize:vertical}
select.inp{appearance:none;-webkit-appearance:none}
label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.field-group{margin-bottom:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600}
.pill.bl{background:rgba(10,132,255,.15);color:var(--blue)}
.pill.gr{background:rgba(48,209,88,.15);color:var(--green)}
.pill.og{background:rgba(255,159,10,.15);color:var(--orange)}
.pill.rd{background:rgba(255,69,58,.15);color:var(--red)}
.pill.pr{background:rgba(191,90,242,.15);color:var(--purple)}
.mb{display:inline-block;padding:3px 6px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer}
.mb.bl{background:rgba(10,132,255,.15);color:var(--blue)}
.mb.gr{background:rgba(48,209,88,.15);color:var(--green)}
.mb.rd{background:rgba(255,69,58,.15);color:var(--red)}
.mb.og{background:rgba(255,159,10,.15);color:var(--orange)}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:var(--bg3);color:var(--t2);border:none;transition:all .2s}
.tab.active{background:var(--blue);color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.gap8{gap:8px}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.mb12{margin-bottom:12px}
.hidden{display:none!important}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:0;animation:sheetUp .3s ease}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shBox{padding:20px}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--t4);margin:8px auto 0}
.sheet-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 0}
.sheet-header h2{font-size:17px;font-weight:600}
.sheet-close{background:var(--bg3);border:none;color:var(--text);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.doc-preview{background:#fff;color:#000;padding:40px;border-radius:8px;font-family:'Times New Roman',serif;font-size:14px;line-height:1.6;min-height:400px}
.doc-preview h1{font-size:16px;text-align:center;margin-bottom:4px;font-family:'Times New Roman',serif}
.doc-preview h2{font-size:14px;text-align:center;margin-bottom:16px;font-family:'Times New Roman',serif}
.doc-preview table{width:100%;border-collapse:collapse;margin:12px 0}
.doc-preview table th,.doc-preview table td{border:1px solid #000;padding:6px 8px;font-size:13px;text-align:left;vertical-align:top}
.doc-preview table th{background:#f0f0f0;font-weight:700}
.doc-preview .field-editable{border:none;border-bottom:1px solid #007aff;background:rgba(0,122,255,.05);padding:4px 6px;font-family:'Times New Roman',serif;font-size:14px;color:#000;width:100%;outline:none;min-height:20px}
.doc-preview textarea.field-editable{min-height:60px;resize:vertical;border:1px solid #007aff;border-radius:4px;padding:8px}
.theme-toggle{background:var(--bg3);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--t4);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;font-size:10px;color:var(--t3);cursor:pointer;transition:color .2s}
.bnav-item.active{color:var(--blue)}
.bnav-item svg{width:24px;height:24px;margin-bottom:2px}
.page-content{padding-bottom:70px}
.print-doc{background:#fff;color:#000;font-family:'Times New Roman',serif}
@media(min-width:900px){.container{padding:24px}.grid2{grid-template-columns:1fr 1fr}.bnav{display:none}}
@media(max-width:899px){.grid2{grid-template-columns:1fr}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t4);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📋 Конструктор документов ООП</h1>
  <div class="topbar-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="Тема">🌓</button>
    <span id="userInfo" style="font-size:12px;color:var(--t2)"></span>
  </div>
</div>

<div class="container">
  <div class="tabs" id="mainTabs">
    <button class="tab active" onclick="showPage('templates')">📋 Шаблоны</button>
    <button class="tab" onclick="showPage('objects')">🎯 Объекты ООП</button>
    <button class="tab" onclick="showPage('assignments')">📎 Назначения</button>
    <button class="tab" onclick="showPage('myDocs')">📝 Мои документы</button>
  </div>
</div>

<div class="container page-content" id="page-templates">
  <div class="flex-between mb12">
    <h2 style="font-size:20px;font-weight:700">Шаблоны документов</h2>
    <button class="btnP btnSm" onclick="openCreateTemplate()">+ Создать</button>
  </div>
  <div id="templatesList"></div>
</div>

<div class="container page-content hidden" id="page-objects">
  <div class="flex-between mb12">
    <h2 style="font-size:20px;font-weight:700">Объекты ООП</h2>
    <button class="btnP btnSm" onclick="openCreateObject()">+ Добавить</button>
  </div>
  <div id="objectsList"></div>
</div>

<div class="container page-content hidden" id="page-assignments">
  <div class="flex-between mb12">
    <h2 style="font-size:20px;font-weight:700">Назначения</h2>
    <button class="btnP btnSm" onclick="openCreateAssignment()">+ Назначить</button>
  </div>
  <div id="assignmentsList"></div>
</div>

<div class="container page-content hidden" id="page-myDocs">
  <h2 style="font-size:20px;font-weight:700;margin-bottom:12px">Мои документы</h2>
  <div id="myDocsList"></div>
</div>

<!-- SHEET: Create/Edit Template -->
<div class="sheet-overlay" id="sheetTemplate">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheetTemplateTitle">Новый шаблон</h2>
      <button class="sheet-close" onclick="closeSheet('sheetTemplate')">✕</button>
    </div>
    <div class="shBox">
      <div class="field-group">
        <label>Название шаблона</label>
        <input class="inp" id="tplName" placeholder="Практическая работа №1">
      </div>
      <div class="field-group">
        <label>Привязка к объекту ООП</label>
        <select class="inp" id="tplObjectId"></select>
      </div>
      <div class="field-group">
        <label>Поля документа (JSON)</label>
        <textarea class="inp" id="tplFields" placeholder='{"student_name":{"label":"ФИО","type":"text","required":true}}'></textarea>
      </div>
      <div class="field-group">
        <label>HTML-содержимое шаблона</label>
        <textarea class="inp" id="tplHtml" style="min-height:200px" placeholder="HTML с {{field_name}} плейсхолдерами"></textarea>
      </div>
      <button class="btnP" style="width:100%" onclick="saveTemplate()">💾 Сохранить шаблон</button>
    </div>
  </div>
</div>

<!-- SHEET: Create OOP Object -->
<div class="sheet-overlay" id="sheetObject">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Новый объект ООП</h2>
      <button class="sheet-close" onclick="closeSheet('sheetObject')">✕</button>
    </div>
    <div class="shBox">
      <div class="field-group">
        <label>Код предмета</label>
        <input class="inp" id="objSubjectCode" value="ОУП.06">
      </div>
      <div class="field-group">
        <label>Раздел</label>
        <input class="inp" id="objSection" placeholder="Раздел 1">
      </div>
      <div class="field-group">
        <label>Тема</label>
        <input class="inp" id="objTheme" placeholder="Тема 1.1">
      </div>
      <div class="field-group">
        <label>Название</label>
        <input class="inp" id="objTitle" placeholder="Повседневная жизнь семьи">
      </div>
      <div class="field-group">
        <label>Часы</label>
        <input class="inp" type="number" id="objHours" value="6">
      </div>
      <div class="field-group">
        <label>Компетенции</label>
        <input class="inp" id="objCompetencies" placeholder="ОК01, ОК02, ОК04">
      </div>
      <button class="btnP" style="width:100%" onclick="saveObject()">💾 Сохранить</button>
    </div>
  </div>
</div>

<!-- SHEET: Create Assignment -->
<div class="sheet-overlay" id="sheetAssignment">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Назначить документ</h2>
      <button class="sheet-close" onclick="closeSheet('sheetAssignment')">✕</button>
    </div>
    <div class="shBox">
      <div class="field-group">
        <label>Шаблон</label>
        <select class="inp" id="asgTemplate"></select>
      </div>
      <div class="field-group">
        <label>Назначить (группа или UID студента)</label>
        <input class="inp" id="asgTarget" placeholder="group:ТЭРО-125 или user:abc123">
      </div>
      <div class="field-group">
        <label>Дедлайн</label>
        <input class="inp" type="datetime-local" id="asgDeadline">
      </div>
      <button class="btnP" style="width:100%" onclick="saveAssignment()">📎 Назначить</button>
    </div>
  </div>
</div>

<!-- SHEET: Fill Document -->
<div class="sheet-overlay" id="sheetFillDoc">
  <div class="sheet" style="max-width:800px">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="fillDocTitle">Заполнение документа</h2>
      <button class="sheet-close" onclick="closeSheet('sheetFillDoc')">✕</button>
    </div>
    <div class="shBox">
      <div id="docPreviewArea"></div>
      <div class="mt16" style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btnP" onclick="saveFilledDoc()">💾 Сохранить</button>
        <button class="btnS" onclick="downloadPDF()">📥 Скачать PDF</button>
        <button class="btnS" onclick="downloadDOCX()">📥 Скачать DOCX</button>
        <button class="btnP btnSm" style="background:var(--green)" onclick="submitDoc()">✅ Сдать</button>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bnav">
  <div class="bnav-item active" onclick="showPage('templates')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    Шаблоны
  </div>
  <div class="bnav-item" onclick="showPage('objects')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
    Объекты
  </div>
  <div class="bnav-item" onclick="showPage('assignments')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11.35 3.836c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c.98 0 1.813.626 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m8.9-4.414c.376.023.75.05 1.124.08 1.131.094 1.976 1.057 1.976 2.192V16.5A2.25 2.25 0 0118 18.75h-2.25m-7.5-10.5H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V18.75m-7.5-10.5h6.375c.621 0 1.125.504 1.125 1.125v9.375m-8.25-3l1.5 1.5 3-3.75"/></svg>
    Назначения
  </div>
  <div class="bnav-item" onclick="showPage('myDocs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
    Мои документы
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/docx@8.2.2/build/index.umd.js"></script>

<script>
// ============================================================
// FIREBASE CONFIG
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyBCy0hz_PHMGUX2M52Wnwb0C9nEnBBfeq8",
  authDomain: "my-diary-e223c.firebaseapp.com",
  databaseURL: "https://my-diary-e223c-default-rtdb.firebaseio.com",
  projectId: "my-diary-e223c",
  storageBucket: "my-diary-e223c.firebasestorage.app",
  messagingSenderId: "903986378920",
  appId: "1:903986378920:web:b6ebc6691f6d767f78aa9d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
// ТЕКУЩИЙ ПОЛЬЗОВАТЕЛЬ
// ============================================================
let currentUser = {
  uid: 'admin1',
  name: 'Преподаватель Петров А.В.',
  role: 'admin',
  group: ''
};
// Для студента раскомментируй:
// currentUser = { uid: 'student1', name: 'Иванов И.И.', role: 'student', group: 'ТЭРО-125' };

document.getElementById('userInfo').textContent = currentUser.name + ' [' + currentUser.role + ']';

// ============================================================
// ТЕМА
// ============================================================
function toggleTheme() {
  const html = document.documentElement;
  html.dataset.theme = html.dataset.theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('theme', html.dataset.theme);
}
if (localStorage.getItem('theme')) document.documentElement.dataset.theme = localStorage.getItem('theme');

// ============================================================
// НАВИГАЦИЯ
// ============================================================
let currentPage = 'templates';
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('[id^="page-"]').forEach(el => el.classList.add('hidden'));
  document.getElementById('page-' + page).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  const tabs = document.querySelectorAll('.tab');
  const bnavs = document.querySelectorAll('.bnav-item');
  const map = { templates: 0, objects: 1, assignments: 2, myDocs: 3 };
  if (tabs[map[page]]) tabs[map[page]].classList.add('active');
  if (bnavs[map[page]]) bnavs[map[page]].classList.add('active');
  loadPageData(page);
}

function loadPageData(page) {
  if (page === 'templates') loadTemplates();
  if (page === 'objects') loadObjects();
  if (page === 'assignments') loadAssignments();
  if (page === 'myDocs') loadMyDocs();
}

// ============================================================
// SHEETS
// ============================================================
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.sheet-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

// ============================================================
// OOP OBJECTS
// ============================================================
const DEFAULT_OBJECTS = [
  { section:"Раздел 1", theme:"Тема 1.1", title:"Повседневная жизнь семьи. Внешность и характер членов семьи", hours:6, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.2", title:"Молодёжь в современном обществе. Досуг молодёжи: увлечения и интересы", hours:6, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.3", title:"Условия проживания в городской и сельской местности", hours:6, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.4", title:"Покупки: одежда, обувь и продукты питания", hours:6, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.5", title:"Здоровый образ жизни и забота о здоровье. Спорт", hours:8, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.6", title:"Туризм. Виды отдыха", hours:4, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.7", title:"Страна/страны изучаемого языка", hours:6, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },
  { section:"Раздел 1", theme:"Тема 1.8", title:"Россия", hours:8, competencies:"ОК01, ОК02, ОК04", subjectCode:"ОУП.06" },

// MY DOCS
// ============================================================
let currentFillDocId = null;
let currentFillTemplateId = null;
let currentFillValues = {};
let currentAssignmentId = null;

function loadMyDocs() {
  const container = document.getElementById('myDocsList');
  container.innerHTML = '<p style="color:var(--t3);text-align:center;padding:20px">Загрузка...</p>';
  db.ref('assignments').once('value', asnap => {
    const assignments = asnap.val() || {};
    const myAssignments = Object.entries(assignments).filter(([_, a]) => {
      if (a.assignedTo === 'user:' + currentUser.uid) return true;
      if (a.assignedTo === 'group:' + currentUser.group) return true;
      if (currentUser.role === 'admin' || currentUser.role === 'teacher') return true;
      return false;
    });
    db.ref('filled_documents').orderByChild('studentUid').equalTo(currentUser.uid).once('value', dsnap => {
      const docs = dsnap.val() || {};
      container.innerHTML = '';
      if (myAssignments.length === 0) {
        container.innerHTML = '<p style="color:var(--t3);text-align:center;padding:40px">Нет назначенных документов</p>';
        return;
      }
      myAssignments.forEach(([asgId, asg]) => {
        const tpl = templatesCache[asg.templateId];
        if (!tpl) return;
        const existingDoc = Object.entries(docs).find(([_, d]) => d.assignmentId === asgId);
        const statusPill = existingDoc
          ? `<span class="pill ${existingDoc[1].status === 'submitted' ? 'gr' : existingDoc[1].status === 'graded' ? 'pr' : 'og'}">${existingDoc[1].status === 'submitted' ? 'Сдано' : existingDoc[1].status === 'graded' ? 'Оценено: ' + existingDoc[1].grade : 'Черновик'}</span>`
          : '<span class="pill og">Не начато</span>';
        const deadline = asg.deadline ? new Date(asg.deadline).toLocaleDateString('ru') : '';
        container.innerHTML += `
          <div class="card">
            <div class="flex-between">
              <h3>${tpl.title}</h3>
              ${statusPill}
            </div>
            <p class="mt8">${deadline ? '⏰ Дедлайн: ' + deadline : ''}</p>
            <div class="mt8">
              <button class="btnP btnSm" onclick="openFillDoc('${asgId}','${existingDoc ? existingDoc[0] : ''}')">
                ${existingDoc ? '✏ Продолжить' : '📝 Начать'}
              </button>
            </div>
          </div>`;
      });
    });
  });
}

function openFillDoc(assignmentId, docId) {
  currentAssignmentId = assignmentId;
  const asg = assignmentsCache[assignmentId];
  if (!asg) return;
  const tpl = templatesCache[asg.templateId];
  if (!tpl) return;
  currentFillTemplateId = asg.templateId;
  if (docId) {
    currentFillDocId = docId;
    db.ref('filled_documents/' + docId + '/fieldValues').once('value', snap => {
      currentFillValues = snap.val() || {};
      renderDocPreview(tpl, currentFillValues);
      document.getElementById('fillDocTitle').textContent = tpl.title;
      openSheet('sheetFillDoc');
    });
  } else {
    currentFillDocId = null;
    currentFillValues = {};
    if (currentUser.role === 'student') {
      currentFillValues.student_name = currentUser.name;
      currentFillValues.group = currentUser.group;
    }
    currentFillValues.date = new Date().toISOString().split('T')[0];
    if (tpl.objectId && objectsCache[tpl.objectId]) {
      currentFillValues.topic = objectsCache[tpl.objectId].theme + ': ' + objectsCache[tpl.objectId].title;
    }
    renderDocPreview(tpl, currentFillValues);
    document.getElementById('fillDocTitle').textContent = tpl.title;
    openSheet('sheetFillDoc');
  }
}

function renderDocPreview(tpl, values) {
  let html = tpl.htmlContent || '';
  const fields = tpl.fields || {};
  Object.entries(fields).forEach(([key, field]) => {
    const val = values[key] || '';
    let inputHtml;
    if (field.type === 'textarea') {
      inputHtml = `<textarea class="field-editable" data-field="${key}" placeholder="${field.label}">${val}</textarea>`;
    } else if (field.type === 'date') {
      inputHtml = `<input type="date" class="field-editable" data-field="${key}" value="${val}">`;
    } else {
      inputHtml = `<input type="text" class="field-editable" data-field="${key}" value="${val}" placeholder="${field.label}">`;
    }
    html = html.replace(new RegExp('\\{\\{' + key + '\\}\\}', 'g'), inputHtml);
  });
  document.getElementById('docPreviewArea').innerHTML = `<div class="doc-preview" id="docPrintable">${html}</div>`;
}

function collectFieldValues() {
  const vals = {};
  document.querySelectorAll('.field-editable').forEach(el => {
    vals[el.dataset.field] = el.value || el.textContent;
  });
  return vals;
}

function saveFilledDoc() {
  const vals = collectFieldValues();
  const data = {
    templateId: currentFillTemplateId,
    assignmentId: currentAssignmentId,
    studentUid: currentUser.uid,
    status: 'draft',
    lastSavedAt: Date.now(),
    fieldValues: vals
  };
  if (currentFillDocId) {
    db.ref('filled_documents/' + currentFillDocId).update(data);
    alert('✅ Сохранено!');
  } else {
    const ref = db.ref('filled_documents').push(data);
    currentFillDocId = ref.key;
    alert('✅ Документ создан и сохранён!');
  }
}

function submitDoc() {
  if (!currentFillDocId) saveFilledDoc();
  if (currentFillDocId) {
    db.ref('filled_documents/' + currentFillDocId).update({ status: 'submitted' });
    alert('✅ Документ сдан преподавателю!');
    closeSheet('sheetFillDoc');
    if (currentPage === 'myDocs') loadMyDocs();
  }
}

// ============================================================
// PDF
// ============================================================
function downloadPDF() {
  const printArea = buildPrintHtml();
  const opt = {
    margin: [10, 10, 10, 10],
    filename: (templatesCache[currentFillTemplateId]?.title || 'document') + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(printArea).save();
}

function buildPrintHtml() {
  const tpl = templatesCache[currentFillTemplateId];
  if (!tpl) return '<p>Шаблон не найден</p>';
  let html = tpl.htmlContent || '';
  const vals = collectFieldValues();
  const fields = tpl.fields || {};
  Object.entries(fields).forEach(([key, field]) => {
    const val = vals[key] || '______';
    const display = field.type === 'date' && val && val !== '______'
      ? new Date(val).toLocaleDateString('ru')
      : val;
    html = html.replace(new RegExp('\\{\\{' + key + '\\}\\}', 'g'), `<span style="border-bottom:1px solid #000;padding:0 4px">${display}</span>`);
  });
  const wrapper = document.createElement('div');
  wrapper.className = 'print-doc';
  wrapper.style.cssText = 'font-family:Times New Roman,serif;font-size:14px;line-height:1.6;color:#000;padding:20px';
  wrapper.innerHTML = html;
  return wrapper;
}

// ============================================================
// DOCX
// ============================================================
function downloadDOCX() {
  const vals = collectFieldValues();
  const tpl = templatesCache[currentFillTemplateId];
  if (!tpl) return;
  const fields = tpl.fields || {};
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle, AlignmentType } = docx;
  const children = [];
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, children: [
    new TextRun({ text: 'Приложение 9.3.6 ОПОП-ППССЗ по специальности 11.02.06', size: 20 })
  ]}));
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 200 }, children: [
    new TextRun({ text: 'ПРАКТИЧЕСКАЯ РАБОТА', bold: true, size: 28 })
  ]}));
  children.push(new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 400 }, children: [
    new TextRun({ text: 'по учебному предмету ОУП.06 Иностранный язык', size: 24 })
  ]}));
  const infoRows = [
    ['ФИО студента:', vals.student_name || ''],
    ['Группа:', vals.group || ''],
    ['Дата:', vals.date ? new Date(vals.date).toLocaleDateString('ru') : ''],
    ['Тема:', vals.topic || '']
  ];
  const cellBorder = { style: BorderStyle.SINGLE, size: 1, color: '000000' };
  const borders = { top: cellBorder, bottom: cellBorder, left: cellBorder, right: cellBorder };
  children.push(new Table({
    width: { size: 100, type: WidthType.PERCENTAGE },
    rows: infoRows.map(([label, value]) => new TableRow({
      children: [
        new TableCell({ borders, width: { size: 35, type: WidthType.PERCENTAGE }, children: [
          new Paragraph({ children: [new TextRun({ text: label, bold: true, size: 22 })] })
        ]}),
        new TableCell({ borders, children: [
          new Paragraph({ children: [new TextRun({ text: value, size: 22 })] })
        ]})
      ]
    }))
  }));
  const taskFields = ['task1', 'task2', 'task3', 'conclusion'];
  taskFields.forEach(key => {
    if (fields[key]) {
      children.push(new Paragraph({ spacing: { before: 300 }, children: [
        new TextRun({ text: fields[key].label, bold: true, size: 24 })
      ]}));
      children.push(new Paragraph({ spacing: { after: 200 }, children: [
        new TextRun({ text: vals[key] || '', size: 22 })
      ]}));
    }
  });
  children.push(new Paragraph({ spacing: { before: 400 }, children: [
    new TextRun({ text: 'Оценка: ' + (vals.grade || '___'), size: 22 }),
    new TextRun({ text: '    Подпись преподавателя: ___________', size: 22 })
  ]}));
  const doc = new Document({ sections: [{ children }] });
  Packer.toBlob(doc).then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (tpl.title || 'document') + '.docx';
    a.click();
    URL.revokeObjectURL(url);
  });
}
