<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Конструктор рабочих программ</title>
<style>
:root{--bg:#000;--bg2:#1c1c1e;--bg3:#2c2c2e;--card:#1c1c1e;--text:#fff;--t2:rgba(255,255,255,.7);--t3:rgba(255,255,255,.4);--t4:rgba(255,255,255,.12);--blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--purple:#bf5af2;--r:14px;--rs:10px}
[data-theme="light"]{--bg:#f2f2f7;--bg2:#fff;--bg3:#e5e5ea;--card:#fff;--text:#000;--t2:rgba(0,0,0,.6);--t3:rgba(0,0,0,.35);--t4:rgba(0,0,0,.08);--blue:#007aff;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
.ae{height:1.2em;width:1.2em;vertical-align:-0.2em;display:inline-block;pointer-events:none}
.topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--t4);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px)}
.topbar h1{font-size:17px;font-weight:600}
.topbar-r{display:flex;gap:8px;align-items:center}
.container{max-width:960px;margin:0 auto;padding:16px}
.card{background:var(--card);border:1px solid var(--t4);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card h3{font-size:15px;font-weight:600;margin-bottom:6px}
.card p{font-size:13px;color:var(--t2);line-height:1.5}
.btn{border:none;padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(.96);opacity:.8}
.btnP{background:var(--blue);color:#fff}
.btnS{background:transparent;color:var(--text);border:1px solid var(--t4)!important}
.btnD{background:var(--red);color:#fff}
.btnG{background:var(--green);color:#fff}
.btnSm{padding:6px 14px;font-size:12px;border-radius:var(--rs)}
.inp{width:100%;padding:14px;border-radius:var(--r);border:1px solid var(--t4);background:var(--bg2);color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--blue)}
textarea.inp{min-height:120px;resize:vertical;line-height:1.6}
label{display:block;font-size:13px;color:var(--t2);margin-bottom:6px;font-weight:500}
.fg{margin-bottom:16px}
.pill{display:inline-block;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600}
.pill.bl{background:rgba(10,132,255,.15);color:var(--blue)}
.pill.gr{background:rgba(48,209,88,.15);color:var(--green)}
.pill.og{background:rgba(255,159,10,.15);color:var(--orange)}
.pill.rd{background:rgba(255,69,58,.15);color:var(--red)}
.pill.pr{background:rgba(191,90,242,.15);color:var(--purple)}
.flex-b{display:flex;justify-content:space-between;align-items:center}
.gap8{display:flex;gap:8px;flex-wrap:wrap}
.mt8{margin-top:8px}
.mt16{margin-top:16px}
.mb12{margin-bottom:12px}
.hidden{display:none!important}
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--card);border:1px solid var(--t4);border-radius:20px;padding:32px;width:100%;max-width:380px;text-align:center}
.auth-box h2{font-size:22px;margin-bottom:8px}
.auth-box p{font-size:13px;color:var(--t3);margin-bottom:24px}
.auth-err{color:var(--red);font-size:13px;margin-top:8px;min-height:18px}
.sec-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.sec-tab{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--t3);border:none;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.sec-tab.active{background:var(--purple);color:#fff}
.sec-tab:hover{color:var(--text)}
.sec-tab .ae{height:0.9em;width:0.9em;vertical-align:-0.1em}
.sec-content{background:var(--bg3);border-radius:var(--r);padding:16px;min-height:200px}
.sec-content h4{font-size:14px;margin-bottom:12px;color:var(--blue);display:flex;align-items:center;gap:6px}
.readonly-text{background:var(--bg2);border:1px solid var(--t4);border-radius:var(--r);padding:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;color:var(--text);min-height:60px}
.toast{position:fixed;top:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;font-weight:600;z-index:999;transform:translateX(120%);transition:transform .3s ease}
.toast.show{transform:translateX(0)}
.th-tog{background:var(--bg3);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-ov.open{display:flex}
.sheet{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;animation:shUp .3s ease}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:5px;border-radius:3px;background:var(--t4);margin:8px auto 0}
.sh-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 0}
.sh-head h2{font-size:17px;font-weight:600}
.sh-close{background:var(--bg3);border:none;color:var(--text);width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sh-body{padding:20px}
@media(max-width:600px){
  .sec-tabs{gap:3px}
  .sec-tab{font-size:10px;padding:5px 8px}
  .topbar h1{font-size:14px}
  .topbar-r{gap:4px}
}
</style>
</head>

      <div class="gap8">
        <button class="btn btnSm btnG" onclick="downloadAsDocx()">DOCX</button>

      </div>
    </div>
    <div class="card" style="border-left:4px solid var(--purple)">
      <h3 id="editorTitle"></h3>
      <p id="editorMeta"></p>
    </div>
    <div class="sec-tabs" id="sectionTabs"></div>
    <div class="sec-content" id="sectionContent">
      <p style="color:var(--t3);text-align:center;padding:40px">Выберите раздел</p>
    </div>
  </div>
</div>

<!-- SHEET: Add Program -->
<div class="sheet-ov" id="sheetAddProgram">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-head">
      <h2>Новая рабочая программа</h2>
      <button class="sh-close" onclick="closeSheet('sheetAddProgram')">✕</button>

    <div class="sh-body">

      <div class="fg"><label>Форма обучения</label><input class="inp" id="newForm" value="Очная"></div>
      <div class="fg"><label>Год начала подготовки</label><input class="inp" id="newYear" type="number" value="2024"></div>
      <div class="fg">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="newPrefill">
          Заполнить данными из рабочей программы ОУП.06
        </label>
      </div>
      <button class="btn btnP" style="width:100%" onclick="saveNewProgram()">Создать программу</button>
    </div>
  </div>
</div>

title_page:`РАБОЧАЯ ПРОГРАММА УЧЕБНОГО ПРЕДМЕТА

ОУП.06 Иностранный язык

программа подготовки специалистов среднего звена
по специальности 11.02.06 Техническая эксплуатация транспортного радиоэлектронного оборудования (по видам транспорта)

Квалификация выпускника: Техник
Форма обучения: Очная
Год начала подготовки: 2024

Рабочая программа учебного предмета разработана на основе:
— Федерального государственного образовательного стандарта среднего профессионального образования по специальности 11.02.06 Техническая эксплуатация транспортного радиоэлектронного оборудования (по видам транспорта), утверждённого приказом Министерства образования и науки Российской Федерации от 28 июля 2014 г. № 808;

goals:`1. ЦЕЛИ И ЗАДАЧИ УЧЕБНОГО ПРЕДМЕТА

Содержание программы учебного предмета «Иностранный язык» направлено на достижение следующих целей:

— понимание иностранного языка как средства межличностного и профессионального общения, инструмента познания, самообразования, социализации и самореализации в полиязычном и поликультурном мире;
— формирование иноязычной коммуникативной компетенции в совокупности её составляющих: речевой, языковой, социокультурной, компенсаторной и учебно-познавательной;
— развитие национального самосознания, общечеловеческих ценностей, стремления к лучшему пониманию культуры своего народа и народов стран изучаемого языка.

Задачи:
— формирование и развитие коммуникативных умений (говорение, аудирование, чтение, письмо);
— формирование и развитие языковых навыков (фонетика, лексика, грамматика);
— формирование и развитие социокультурных умений и навыков.`,

place_in_oop:`2. МЕСТО УЧЕБНОГО ПРЕДМЕТА В СТРУКТУРЕ ОПОП

Учебный предмет «Иностранный язык» является обязательным учебным предметом общеобразовательного цикла ОПОП-ППССЗ по специальности 11.02.06 Техническая эксплуатация транспортного радиоэлектронного оборудования (по видам транспорта).

Учебный предмет «Иностранный язык» (базовый уровень) изучается в общеобразовательном цикле учебного плана ОПОП-ППССЗ на базе основного общего образования с получением среднего общего образования.

Учебный предмет «Иностранный язык» имеет межпредметные связи с общеобразовательными учебными предметами — Русский язык, Литература, История, а также с дисциплинами и профессиональными модулями ОПОП.`,

results:`3. РЕЗУЛЬТАТЫ ОБУЧЕНИЯ (ОСВОЕНИЯ) УЧЕБНОГО ПРЕДМЕТА

Освоение содержания учебного предмета «Иностранный язык» обеспечивает достижение обучающимися следующих результатов:

ЛИЧНОСТНЫЕ РЕЗУЛЬТАТЫ:
ЛР 01 — Сформированность российской гражданской идентичности, патриотизма, уважения к своему народу
ЛР 02 — Гражданская позиция как активного и ответственного члена российского общества
ЛР 04 — Сформированность мировоззрения, соответствующего современному уровню развития науки
ЛР 05 — Сформированность основ саморазвития и самовоспитания
ЛР 06 — Толерантное сознание и поведение в поликультурном мире
ЛР 07 — Навыки сотрудничества со сверстниками
ЛР 08 — Нравственное сознание и поведение на основе усвоения общечеловеческих ценностей
ЛР 09 — Готовность и способность к образованию, в том числе самообразованию
ЛР 10 — Эстетическое отношение к миру
ЛР 13 — Осознанный выбор будущей профессии

МЕТАПРЕДМЕТНЫЕ РЕЗУЛЬТАТЫ:
МР 01 — Умение самостоятельно определять цели деятельности
МР 02 — Умение продуктивно общаться и взаимодействовать
МР 03 — Владение навыками познавательной, учебно-исследовательской и проектной деятельности
МР 04 — Готовность к самостоятельной информационно-познавательной деятельности
МР 05 — Умение использовать средства ИКТ
МР 07 — Умение самостоятельно оценивать и принимать решения
МР 08 — Владение языковыми средствами
МР 09 — Владение навыками познавательной рефлексии

ПРЕДМЕТНЫЕ РЕЗУЛЬТАТЫ:
ПРб 01 — Сформированность коммуникативной иноязычной компетенции
ПРб 02 — Владение знаниями о социокультурной специфике страны/стран изучаемого языка
ПРб 03 — Достижение уровня владения иностранным языком, превышающего пороговый (B1)
ПРб 04 — Сформированность умения использовать иностранный язык как средство для получения информации

ОБЩИЕ КОМПЕТЕНЦИИ:
ОК 01 — Выбирать способы решения задач профессиональной деятельности
ОК 02 — Использовать современные средства поиска, анализа и интерпретации информации
ОК 04 — Эффективно взаимодействовать и работать в коллективе и команде
ОК 09 — Пользоваться профессиональной документацией на государственном и иностранном языках

ПРОФЕССИОНАЛЬНЫЕ КОМПЕТЕНЦИИ:
ПК 4.3 — Составлять и оформлять техническую и технологическую документацию`,

structure:`4. СТРУКТУРА И СОДЕРЖАНИЕ УЧЕБНОГО ПРЕДМЕТА

4.1. Объём учебного предмета и виды учебной работы:

Максимальная учебная нагрузка (всего): 117 часов
Обязательная аудиторная нагрузка (всего): 78 часов

let currentProgramData=null;

function toggleTheme(){const h=document.documentElement;h.dataset.theme=h.dataset.theme==='light'?'dark':'light';localStorage.setItem('theme',h.dataset.theme)}
if(localStorage.getItem('theme'))document.documentElement.dataset.theme=localStorage.getItem('theme');

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function openSheet(id){document.getElementById(id).classList.add('open')}
function closeSheet(id){document.getElementById(id).classList.remove('open')}
document.querySelectorAll('.sheet-ov').forEach(ov=>{ov.addEventListener('click',e=>{if(e.target===ov)ov.classList.remove('open')})});

// ======================================================================
// AUTH
// ======================================================================
function doLogin(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  const errEl=document.getElementById('authErr');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Заполните все поля';return}
  if(pass.length<6){errEl.textContent='Пароль минимум 6 символов';return}

  auth.signInWithEmailAndPassword(email,pass)
    .then(()=>{errEl.textContent=''})
    .catch(err=>{
      console.log('Login error:',err.code);
      if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential'){
        errEl.textContent='Создаю аккаунт...';
        auth.createUserWithEmailAndPassword(email,pass)
          .then(cred=>{
            const role=(email==='admin@test.ru')?'admin':'viewer';
            return db.ref('users/'+cred.user.uid).set({email,role,createdAt:Date.now()});
          })
          .then(()=>{errEl.textContent=''})
          .catch(e2=>{
            if(e2.code==='auth/email-already-in-use'){
              errEl.textContent='Неверный пароль. Попробуйте снова.';
            } else {
              errEl.textContent='Ошибка: '+e2.message;
            }
          });
      } else if(err.code==='auth/wrong-password'){
        errEl.textContent='Неверный пароль';
      } else if(err.code==='auth/too-many-requests'){
        errEl.textContent='Слишком много попыток. Подождите минуту.';
      } else {
        errEl.textContent='Ошибка: '+err.message;
      }
    });
}

function doLogout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user;
    db.ref('users/'+user.uid).once('value',snap=>{
      const data=snap.val();
      if(!data){
        const role=user.email==='admin@test.ru'?'admin':'viewer';
        db.ref('users/'+user.uid).set({email:user.email,role,createdAt:Date.now()});
        userRole=role;
      } else {
        userRole=data.role||'viewer';
      }
      showApp();
    });
  } else {
    currentUser=null;userRole=null;
    document.getElementById('authScreen').classList.remove('hidden');
    document.getElementById('appMain').classList.add('hidden');
  }
});

function showApp(){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('userLabel').textContent=currentUser.email;
  document.getElementById('roleLabel').innerHTML=userRole==='admin'?ae(E.wrench)+' Редактор':ae(E.eye)+' Просмотр';
  document.getElementById('roleLabel').className='pill '+(userRole==='admin'?'gr':'bl');
  document.getElementById('btnAddProgram').classList.toggle('hidden',userRole!=='admin');
  loadPrograms();showProgramsList();
}

function isAdmin(){return userRole==='admin'}

            <span class="pill ${pct>=80?'gr':pct>=40?'og':'rd'}">${sc}/${total} разделов</span>
          </div>
          <h3 class="mt8">${prog.title||'Без названия'}</h3>
          <p>${prog.specialty||''}</p>
          <p class="mt8" style="font-size:11px;color:var(--t3)">${ae(E.calendar)} Создано: ${dateStr}${updStr?' | Обновлено: '+updStr:''}</p>
          ${isAdmin()?`<div class="mt8"><button class="btn btnSm btnD" onclick="event.stopPropagation();deleteProgram('${id}')">${ae(E.trash)} Удалить</button></div>`:''}
        </div>`;
    });
  });
}

// ======================================================================
// ADD PROGRAM
// ======================================================================
function openAddProgram(){
  if(!isAdmin())return;
  document.getElementById('newCode').value='';
  document.getElementById('newTitle').value='';
  document.getElementById('newSpecialty').value='';
  document.getElementById('newQualification').value='';
  document.getElementById('newForm').value='Очная';
  document.getElementById('newYear').value=new Date().getFullYear();
  document.getElementById('newPrefill').checked=false;
  openSheet('sheetAddProgram');
}

function saveNewProgram(){
  if(!isAdmin())return;
  const code=document.getElementById('newCode').value.trim();
  const title=document.getElementById('newTitle').value.trim();
  if(!code||!title){alert('Заполните код и название');return}
  const prefill=document.getElementById('newPrefill').checked;
  const data={
    code,title,
    specialty:document.getElementById('newSpecialty').value.trim(),
    qualification:document.getElementById('newQualification').value.trim(),
    form:document.getElementById('newForm').value.trim(),
    year:document.getElementById('newYear').value.trim(),
    createdBy:currentUser.uid,
    createdAt:Date.now(),
    updatedAt:Date.now(),
    sections:{}
  };
  SECTIONS.forEach(s=>{data.sections[s.key]=prefill?(PREFILL_DATA[s.key]||''):'';});
  db.ref('programs').push(data);
  closeSheet('sheetAddProgram');
  toast('Программа создана');
}

function deleteProgram(id){
  if(!isAdmin())return;
  if(confirm('Удалить эту рабочую программу? Действие необратимо.')){
    db.ref('programs/'+id).remove();
    toast('Программа удалена');
  }
}

// ======================================================================
// OPEN PROGRAM
// ======================================================================
function openProgram(id){
  currentProgramId=id;currentSectionKey=null;
  document.getElementById('programsListPage').classList.add('hidden');
  document.getElementById('programEditorPage').classList.remove('hidden');
  db.ref('programs/'+id).on('value',snap=>{
    currentProgramData=snap.val();
    if(!currentProgramData){backToList();return}
    renderEditor();
  });
}

function renderEditor(){
  const prog=currentProgramData;
  document.getElementById('editorTitle').textContent=prog.code+' — '+prog.title;
  document.getElementById('editorMeta').innerHTML=`${prog.specialty||''} &bull; ${prog.qualification||''} &bull; ${prog.form||''} &bull; ${prog.year||''}`;
  const tabsEl=document.getElementById('sectionTabs');
  tabsEl.innerHTML='';
  SECTIONS.forEach(s=>{
    const has=prog.sections&&prog.sections[s.key]&&prog.sections[s.key].trim();
    const active=currentSectionKey===s.key;
    tabsEl.innerHTML+=`<button class="sec-tab ${active?'active':''}" onclick="selectSection('${s.key}',this)">${ae(s.icon)} ${s.name} ${has?ae(E.check):''}</button>`;
  });
  if(currentSectionKey)renderSection(currentSectionKey);
}

function selectSection(key,el){
  currentSectionKey=key;
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderSection(key);
}

function renderSection(key){
  const sec=SECTIONS.find(s=>s.key===key);
  if(!sec)return;
  const content=(currentProgramData.sections&&currentProgramData.sections[key])||'';
  const container=document.getElementById('sectionContent');
  if(isAdmin()){
    container.innerHTML=`
      <h4>${ae(sec.icon)} ${sec.name}</h4>
      <div class="fg">
        <label>Содержимое раздела</label>
        <textarea class="inp" id="sectionTextarea" style="min-height:350px;font-size:14px;line-height:1.7"
                  placeholder="Введите содержимое раздела..."
                  oninput="markUnsaved()">${escapeHtml(content)}</textarea>
      </div>
      <div class="gap8">
        <button class="btn btnP" onclick="saveSection()">${ae(E.save)} Сохранить</button>
        <button class="btn btnSm btnS" onclick="clearSection()">${ae(E.trash)} Очистить</button>
      </div>
      <div id="saveStatus" class="mt8" style="font-size:12px;color:var(--t3)">
        ${content?ae(E.check)+' Сохранено':ae(E.memo)+' Раздел пуст'}
      </div>`;
  } else {
    container.innerHTML=`
      <h4>${ae(sec.icon)} ${sec.name}</h4>
      ${content?`<div class="readonly-text">${escapeHtml(content)}</div>`:`<p style="color:var(--t3);padding:20px;text-align:center">Раздел не заполнен</p>`}`;
  }
}

function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML}
function markUnsaved(){const s=document.getElementById('saveStatus');if(s)s.innerHTML=`<span style="color:var(--orange)">${ae(E.warning)} Несохранённые изменения</span>`}

function saveSection(){
  if(!isAdmin()||!currentProgramId||!currentSectionKey)return;
  const text=document.getElementById('sectionTextarea').value;
  db.ref('programs/'+currentProgramId+'/sections/'+currentSectionKey).set(text);
  db.ref('programs/'+currentProgramId+'/updatedAt').set(Date.now());
  const s=document.getElementById('saveStatus');
  if(s)s.innerHTML=`<span style="color:var(--green)">${ae(E.check)} Сохранено</span>`;
  toast('Раздел сохранён');
}

function clearSection(){
  if(!isAdmin())return;
  if(confirm('Очистить раздел?')){
    document.getElementById('sectionTextarea').value='';
    saveSection();
  }
}

// ======================================================================
// DOCX
// ======================================================================
function downloadAsDocx(){
  if(!currentProgramData)return;
  const prog=currentProgramData;
  const{Document,Packer,Paragraph,TextRun,HeadingLevel,AlignmentType,PageBreak}=docx;
  const children=[];
  children.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:200},children:[new TextRun({text:'РАБОЧАЯ ПРОГРАММА',bold:true,size:32})]}));
  children.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:100},children:[new TextRun({text:`учебной дисциплины ${prog.code} ${prog.title}`,size:28})]}));
  children.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:100},children:[new TextRun({text:`${prog.specialty||''}`,size:22})]}));
  children.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:100},children:[new TextRun({text:`${prog.qualification||''} | ${prog.form||''} | ${prog.year||''}`,size:20})]}));
  children.push(new Paragraph({children:[new PageBreak()]}));
  SECTIONS.forEach(sec=>{
    const text=(prog.sections&&prog.sections[sec.key])||'';
    children.push(new Paragraph({heading:HeadingLevel.HEADING_2,spacing:{before:400,after:200},children:[new TextRun({text:sec.name,bold:true,size:26})]}));
    if(text){
      text.split('\n').forEach(line=>{
        children.push(new Paragraph({spacing:{after:80},children:[new TextRun({text:line,size:22})]}));
      });
    } else {
      children.push(new Paragraph({children:[new TextRun({text:'(Раздел не заполнен)',italics:true,size:22,color:'999999'})]}));
    }
  });
  const doc=new Document({sections:[{children}]});
  Packer.toBlob(doc).then(blob=>{
    const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`РП_${prog.code}_${prog.title}.docx`;a.click();URL.revokeObjectURL(url);
  });
  toast('DOCX скачивается...');
}

// ======================================================================
// PDF
// ======================================================================
function downloadAsPdf(){
  if(!currentProgramData)return;
  const prog=currentProgramData;
  let html=`<div style="font-family:'Times New Roman',serif;color:#000;padding:20px">
    <h1 style="text-align:center;font-size:18px;margin-bottom:4px">РАБОЧАЯ ПРОГРАММА</h1>
    <h2 style="text-align:center;font-size:16px;font-weight:normal;margin-bottom:8px">учебной дисциплины ${prog.code} ${prog.title}</h2>
    <p style="text-align:center;font-size:13px;color:#666;margin-bottom:24px">${prog.specialty||''} | ${prog.qualification||''} | ${prog.form||''} | ${prog.year||''}</p><hr style="margin-bottom:24px">`;
  SECTIONS.forEach(sec=>{
    const text=(prog.sections&&prog.sections[sec.key])||'';
    html+=`<h3 style="font-size:14px;margin:20px 0 8px;color:#333">${sec.name}</h3>`;
    html+=text?`<div style="font-size:13px;line-height:1.7;white-space:pre-wrap">${escapeHtml(text)}</div>`:`<p style="color:#999;font-style:italic;font-size:12px">(Раздел не заполнен)</p>`;
  });
  html+='</div>';
  const wrapper=document.createElement('div');wrapper.innerHTML=html;
  html2pdf().set({margin:[15,15,15,15],filename:`РП_${prog.code}_${prog.title}.pdf`,image:{type:'jpeg',quality:0.98},html2canvas:{scale:2},jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}}).from(wrapper).save();
  toast('PDF скачивается...');
}
</script>
